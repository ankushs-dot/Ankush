<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account &middot; Sineva Content Engine</title>
<style>
  :root{
    --bg:#0c0a14; --panel:#161222; --panel-2:#1f1830; --line:#2c2440;
    --text:#f0ebff; --muted:#9c8fc0; --accent:#b07cff; --accent-2:#ffce4d;
    --saffron:#ff8a3d; --green:#3ddc97; --red:#ff6b7d; --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--text);background:var(--bg);overflow:hidden;display:grid;place-items:center;min-height:100vh}
  /* animated aurora background */
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;animation:float 18s ease-in-out infinite}
  .orb.a{width:520px;height:520px;background:radial-gradient(circle,#7d3bd6,transparent 65%);top:-140px;left:-120px}
  .orb.b{width:460px;height:460px;background:radial-gradient(circle,#ff8a3d,transparent 65%);bottom:-160px;right:-120px;animation-delay:-6s}
  .orb.c{width:420px;height:420px;background:radial-gradient(circle,#ffce4d,transparent 65%);top:40%;left:55%;animation-delay:-11s;opacity:.35}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.08)}66%{transform:translate(-40px,50px) scale(.95)}}
  .grid-overlay{position:fixed;inset:0;z-index:0;opacity:.05;
    background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);
    background-size:44px 44px;mask-image:radial-gradient(circle at 50% 40%,#000 0%,transparent 75%)}

  .card{position:relative;z-index:2;width:min(430px,92vw);background:rgba(22,18,34,.72);
    border:1px solid var(--line);border-radius:var(--radius);padding:34px 32px 30px;
    backdrop-filter:blur(18px);box-shadow:0 30px 80px rgba(0,0,0,.55);
    animation:rise .6s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .card.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--saffron),var(--accent));
    display:grid;place-items:center;font-size:20px;font-weight:800;color:#1a0f2e;box-shadow:0 8px 22px rgba(176,124,255,.4)}
  .brand h1{font-size:16px;margin:0}
  .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}

  h2{font-size:22px;margin:0 0 4px}
  .lead{font-size:13px;color:var(--muted);margin:0 0 22px}

  .field{position:relative;margin-bottom:16px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;color:var(--text);
    padding:15px 14px 15px 44px;font-size:14px;transition:.18s}
  .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(176,124,255,.16)}
  .field .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
  .field .toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;
    cursor:pointer;user-select:none;padding:4px 6px;border-radius:6px}
  .field .toggle:hover{color:var(--text);background:rgba(255,255,255,.06)}

  .btn{width:100%;background:linear-gradient(135deg,var(--saffron),var(--accent));color:#1a0f2e;border:none;
    border-radius:11px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:.18s;position:relative;overflow:hidden}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(176,124,255,.4)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
  .spin{width:16px;height:16px;border:2px solid rgba(26,15,46,.35);border-top-color:#1a0f2e;border-radius:50%;animation:sp .7s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn.loading .spin{display:inline-block}
  .btn.loading .label{opacity:.7}

  .msg{font-size:12.5px;border-radius:10px;padding:11px 13px;margin-bottom:16px;display:none;line-height:1.5}
  .msg.err{display:block;background:rgba(255,107,125,.12);border:1px solid rgba(255,107,125,.4);color:#ffc3cb}
  .msg.ok{display:block;background:rgba(61,220,151,.12);border:1px solid rgba(61,220,151,.4);color:#bff4dd}

  .foot{text-align:center;font-size:13px;color:var(--muted);margin-top:20px}
  .foot a{color:var(--accent);font-weight:700}
  .foot a:hover{text-decoration:underline}
  .strength{height:5px;border-radius:4px;background:var(--panel-2);margin:-6px 2px 14px;overflow:hidden}
  .strength i{display:block;height:100%;width:0;border-radius:4px;transition:.25s}
  a{text-decoration:none}
</style>
</head>
<body>
  <div class="bg"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>
  <div class="grid-overlay"></div>

  <div class="card" id="card">
    <div class="brand">
      <div class="logo">S</div>
      <div><h1>Sineva Content Engine</h1><p>AI content, on brand, on autopilot</p></div>
    </div>

    <h2>Create your account</h2>
    <p class="lead">Start generating trend-driven scripts in seconds.</p>

    <div class="msg" id="msg"></div>

    <form id="form" autocomplete="on">
      <div class="field">
        <span class="ic">&#128100;</span>
        <input id="name" type="text" placeholder="Full name" required autocomplete="name" />
      </div>
      <div class="field">
        <span class="ic">&#9993;</span>
        <input id="email" type="email" placeholder="Email address" required autocomplete="email" />
      </div>
      <div class="field">
        <span class="ic">&#128274;</span>
        <input id="password" type="password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password" />
        <span class="toggle" id="tgl">Show</span>
      </div>
      <div class="strength"><i id="bar"></i></div>

      <button class="btn" id="btn" type="submit">
        <span class="spin"></span><span class="label">Create account</span>
      </button>
    </form>

    <p class="foot">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-config.js"></script>
  <script>
    const card=document.getElementById('card'), msg=document.getElementById('msg'),
          btn=document.getElementById('btn'), form=document.getElementById('form');
    const pw=document.getElementById('password'), bar=document.getElementById('bar');

    // config guard
    let client=null;
    if(!window.SUPABASE_URL || String(window.SUPABASE_ANON_KEY||'').indexOf('PASTE_')===0){
      show('err','Setup needed: paste your Supabase anon key into auth-config.js.');
      btn.disabled=true;
    } else {
      client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      client.auth.getSession().then(({data})=>{ if(data.session) location.replace(window.APP_HOME||'index.html'); });
    }

    // show/hide password
    document.getElementById('tgl').onclick=function(){
      const on = pw.type==='password'; pw.type=on?'text':'password'; this.textContent=on?'Hide':'Show';
    };
    // password strength meter
    pw.addEventListener('input',()=>{
      const v=pw.value; let s=0;
      if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
      const pct=[0,25,55,80,100][s], col=['#2c2440','#ff6b7d','#ffce4d','#b07cff','#3ddc97'][s];
      bar.style.width=pct+'%'; bar.style.background=col;
    });

    function show(kind,text){ msg.className='msg '+kind; msg.textContent=text;
      if(kind==='err'){ card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); } }
    function loading(on){ btn.disabled=on; btn.classList.toggle('loading',on); }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      if(!client) return;
      msg.className='msg';
      const name=document.getElementById('name').value.trim();
      const email=document.getElementById('email').value.trim();
      const password=pw.value;
      if(password.length<8){ show('err','Password must be at least 8 characters.'); return; }
      loading(true);
      try{
        const { data, error } = await client.auth.signUp({
          email, password, options:{ data:{ full_name:name } }
        });
        if(error) throw error;
        // email confirmation OFF -> session is returned immediately
        if(data.session){
          show('ok','Account created! Taking you in...');
          setTimeout(()=>location.replace(window.APP_HOME||'index.html'), 700);
          return;
        }
        // fallback: try to sign in right away
        const si = await client.auth.signInWithPassword({ email, password });
        if(si.data && si.data.session){
          location.replace(window.APP_HOME||'index.html'); return;
        }
        show('ok','Account created. Please sign in.');
        setTimeout(()=>location.replace('login.html'), 1200);
      }catch(err){
        show('err', prettify(err.message||'Could not create account.'));
      }finally{ loading(false); }
    });

    function prettify(m){
      if(/already registered|already exists/i.test(m)) return 'That email is already registered. Try signing in.';
      if(/weak|password/i.test(m) && /short|least/i.test(m)) return 'Please choose a stronger password.';
      if(/rate/i.test(m)) return 'Too many attempts. Wait a moment and try again.';
      return m;
    }
  </script>
</body>
</html>
