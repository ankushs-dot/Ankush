<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account &middot; Sineva Content Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f9fcf1; --panel:#ffffff; --panel-2:#f1f6ec; --line:rgba(15,23,42,.12);
    --text:#0f172a; --muted:#64748b;
    --accent:#0b4d3a; --accent-2:#0f6b4e; --accent-3:#37a47b;
    --saffron:#0f6b4e; --green:#16a34a; --red:#dc2626;
    --on-accent:#ffffff; --card-bg:rgba(255,255,255,.82);
    --orb-1:#37a47b; --orb-2:#0f6b4e; --orb-3:#a7e8c8;
    --card-shadow:0 22px 60px rgba(15,23,42,.12); --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#0c0a14; --panel:#161222; --panel-2:#1f1830; --line:#2c2440;
    --text:#f0ebff; --muted:#9c8fc0;
    --accent:#b07cff; --accent-2:#ffce4d; --accent-3:#b07cff;
    --saffron:#ff8a3d; --green:#3ddc97; --red:#ff6b7d;
    --on-accent:#1a0f2e; --card-bg:rgba(22,18,34,.72);
    --orb-1:#7d3bd6; --orb-2:#ff8a3d; --orb-3:#ffce4d;
    --card-shadow:0 30px 80px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--text);background:var(--bg);overflow:hidden;display:grid;place-items:center;min-height:100vh;transition:background .3s,color .3s}
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;animation:float 18s ease-in-out infinite}
  .orb.a{width:520px;height:520px;background:radial-gradient(circle,var(--orb-1),transparent 65%);top:-140px;left:-120px}
  .orb.b{width:460px;height:460px;background:radial-gradient(circle,var(--orb-2),transparent 65%);bottom:-160px;right:-120px;animation-delay:-6s}
  .orb.c{width:420px;height:420px;background:radial-gradient(circle,var(--orb-3),transparent 65%);top:40%;left:55%;animation-delay:-11s;opacity:.35}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.08)}66%{transform:translate(-40px,50px) scale(.95)}}

  .theme-toggle{position:fixed;top:18px;right:18px;z-index:5;display:flex;align-items:center;gap:7px;
    font-size:13px;font-weight:600;color:var(--text);background:var(--card-bg);border:1px solid var(--line);
    padding:8px 13px;border-radius:999px;cursor:pointer;backdrop-filter:blur(10px)}
  .theme-toggle:hover{border-color:var(--accent)}

  .card{position:relative;z-index:2;width:min(430px,92vw);background:var(--card-bg);
    border:1px solid var(--line);border-radius:var(--radius);padding:34px 32px 30px;
    backdrop-filter:blur(18px);box-shadow:var(--card-shadow);animation:rise .6s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .card.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-3));
    display:grid;place-items:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 8px 22px rgba(11,77,58,.3)}
  .brand h1{font-size:16px;margin:0}
  .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}

  h2{font-size:22px;margin:0 0 4px;letter-spacing:-.02em}
  .lead{font-size:13px;color:var(--muted);margin:0 0 22px}

  .field{position:relative;margin-bottom:16px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;color:var(--text);
    padding:15px 14px 15px 44px;font-size:14px;transition:.18s;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent)}
  .field .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
  .field .toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;
    cursor:pointer;user-select:none;padding:4px 6px;border-radius:6px}
  .field .toggle:hover{color:var(--text);background:color-mix(in srgb,var(--text) 8%,transparent)}

  .btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:var(--on-accent);border:none;
    border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:.18s;position:relative;overflow:hidden}
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px color-mix(in srgb,var(--accent) 35%,transparent)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
  .spin{width:16px;height:16px;border:2px solid color-mix(in srgb,var(--on-accent) 35%,transparent);border-top-color:var(--on-accent);border-radius:50%;animation:sp .7s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn.loading .spin{display:inline-block}
  .btn.loading .label{opacity:.7}

  .msg{font-size:12.5px;border-radius:10px;padding:11px 13px;margin-bottom:16px;display:none;line-height:1.5}
  .msg.err{display:block;background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 38%,transparent);color:var(--red)}
  .msg.ok{display:block;background:color-mix(in srgb,var(--green) 14%,transparent);border:1px solid color-mix(in srgb,var(--green) 40%,transparent);color:var(--accent-2)}

  .foot{text-align:center;font-size:13px;color:var(--muted);margin-top:20px}
  .foot a{color:var(--accent-2);font-weight:700;text-decoration:none}
  .foot a:hover{text-decoration:underline}
  .strength{height:5px;border-radius:4px;background:var(--panel-2);margin:-6px 2px 14px;overflow:hidden}
  .strength i{display:block;height:100%;width:0;border-radius:4px;transition:.25s}
  a{text-decoration:none}
</style>
</head>
<body>
  <div class="bg"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">Dark</button>

  <div class="card" id="card">
    <div class="brand">
      <div class="logo">S</div>
      <div><h1>Sineva Content Engine</h1><p>AI content, on brand, on autopilot</p></div>
    </div>

    <h2>Create your account</h2>
    <p class="lead">Start generating trend-driven scripts in seconds.</p>

    <div class="msg" id="msg"></div>

    <form id="form" autocomplete="on">
      <div class="field">
        <span class="ic">&#128100;</span>
        <input id="name" type="text" placeholder="Full name" required autocomplete="name" />
      </div>
      <div class="field">
        <span class="ic">&#9993;</span>
        <input id="email" type="email" placeholder="Email address" required autocomplete="email" />
      </div>
      <div class="field">
        <span class="ic">&#128274;</span>
        <input id="password" type="password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password" />
        <span class="toggle" id="tgl">Show</span>
      </div>
      <div class="strength"><i id="bar"></i></div>
      <button class="btn" id="btn" type="submit"><span class="spin"></span><span class="label">Create account</span></button>
    </form>

    <p class="foot">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script>
    (function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();
    function toggleTheme(){ var d=document.documentElement,n=d.getAttribute('data-theme')==='dark'?'light':'dark';
      d.setAttribute('data-theme',n); localStorage.setItem('theme',n); paintThemeBtn(); }
    function paintThemeBtn(){ var b=document.getElementById('themeBtn'); if(b) b.textContent =
      document.documentElement.getAttribute('data-theme')==='dark' ? '\u2600 Light' : '\u263E Dark'; }
    paintThemeBtn();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-config.js"></script>
  <script>
    const card=document.getElementById('card'), msg=document.getElementById('msg'),
          btn=document.getElementById('btn'), form=document.getElementById('form');
    const pw=document.getElementById('password'), bar=document.getElementById('bar');
    let client=null;
    if(!window.SUPABASE_URL || String(window.SUPABASE_ANON_KEY||'').indexOf('PASTE_')===0){
      show('err','Setup needed: paste your Supabase anon key into auth-config.js.'); btn.disabled=true;
    } else {
      client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      client.auth.getSession().then(({data})=>{ if(data.session) location.replace(window.APP_HOME||'index.html'); });
    }
    document.getElementById('tgl').onclick=function(){ const on=pw.type==='password'; pw.type=on?'text':'password'; this.textContent=on?'Hide':'Show'; };
    pw.addEventListener('input',()=>{ const v=pw.value; let s=0;
      if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
      const pct=[0,25,55,80,100][s], col=['#e2e8f0','#dc2626','#f59e0b','#0f6b4e','#16a34a'][s];
      bar.style.width=pct+'%'; bar.style.background=col; });
    function show(kind,text){ msg.className='msg '+kind; msg.textContent=text;
      if(kind==='err'){ card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); } }
    function loading(on){ btn.disabled=on; btn.classList.toggle('loading',on); }
    form.addEventListener('submit', async (e)=>{
      e.preventDefault(); if(!client) return; msg.className='msg';
      const name=document.getElementById('name').value.trim();
      const email=document.getElementById('email').value.trim(), password=pw.value;
      if(password.length<8){ show('err','Password must be at least 8 characters.'); return; }
      loading(true);
      try{
        const { data, error } = await client.auth.signUp({ email, password, options:{ data:{ full_name:name } } });
        if(error) throw error;
        if(data.session){ show('ok','Account created! Taking you in...');
          setTimeout(()=>location.replace(window.APP_HOME||'index.html'), 700); return; }
        const si = await client.auth.signInWithPassword({ email, password });
        if(si.data && si.data.session){ location.replace(window.APP_HOME||'index.html'); return; }
        show('ok','Account created. Please sign in.'); setTimeout(()=>location.replace('login.html'), 1200);
      }catch(err){ show('err', prettify(err.message||'Could not create account.')); }
      finally{ loading(false); }
    });
    function prettify(m){
      if(/already registered|already exists/i.test(m)) return 'That email is already registered. Try signing in.';
      if(/rate/i.test(m)) return 'Too many attempts. Wait a moment and try again.';
      return m;
    }
  </script>
</body>
</html>
